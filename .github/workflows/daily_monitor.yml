# ═══════════════════════════════════════════════════════════
# GitHub Actions Workflow — German Council Monitor
# ═══════════════════════════════════════════════════════════
# This tells GitHub to run the Python script automatically
# every weekday morning at 9:00 AM Berlin time (7:00 AM UTC).
#
# It can also be triggered manually from the GitHub website
# by clicking "Run workflow" in the Actions tab.
# ═══════════════════════════════════════════════════════════

name: German Council Monitor

on:
  # ── Automatic schedule (cron syntax) ──
  # Runs at 07:00 UTC = 09:00 CET (Berlin time)
  # "1-5" means Monday through Friday only
  schedule:
    - cron: '0 7 * * 1-5'

  # ── Manual trigger ──
  # Allows you to click "Run workflow" on GitHub at any time
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # Safety: cancel if it takes too long

    steps:
      # Step 1: Download your code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install Python packages
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Step 4: Install the Chrome browser for Playwright
      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      # Step 5: Run the monitor script
      # The secrets are injected as environment variables
      - name: Run Council Monitor
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python main.py --city Nuremberg --debug --no-llm

      # Step 6: Save debug screenshots if they were created
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: debug_*.png
          if-no-files-found: ignore
          retention-days: 7
